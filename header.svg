<svg viewBox="0 0 1200 280" width="1200" height="280" xmlns="http://www.w3.org/2000/svg" fill="none" role="img" aria-label="Gazi Yeasin Arifin — Design Engineer, SF Bay Area">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0B0E14"/>
      <stop offset="1" stop-color="#0D1117"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="-5%" r="75%">
      <stop offset="0" stop-color="#00E5FF" stop-opacity="0.12"/>
      <stop offset="1" stop-color="#00E5FF" stop-opacity="0"/>
    </radialGradient>
    <pattern id="dots" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="1.3" cy="1.3" r="1.3" fill="#16333F"/>
    </pattern>
    <radialGradient id="fade" cx="50%" cy="46%" r="62%">
      <stop offset="0" stop-color="#fff" stop-opacity="1"/>
      <stop offset="1" stop-color="#fff" stop-opacity="0"/>
    </radialGradient>
    <mask id="fademask"><rect width="1200" height="280" fill="url(#fade)"/></mask>
    <linearGradient id="travel" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#00E5FF" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#8FF6FF" stop-opacity="1"/>
      <stop offset="1" stop-color="#00E5FF" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="sheen" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#FFFFFF" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
    <clipPath id="lineClip"><rect x="420" y="175" width="360" height="2" rx="1"/></clipPath>
    <clipPath id="nameClip">
      <text x="600" y="152" text-anchor="middle" font-family="'SF Pro Display','Segoe UI',Helvetica,Arial,system-ui,sans-serif" font-size="50" font-weight="700" letter-spacing="5">GAZI YEASIN ARIFIN</text>
    </clipPath>
  </defs>

  <rect width="1200" height="280" fill="url(#bg)"/>
  <rect width="1200" height="280" fill="url(#dots)" mask="url(#fademask)"/>
  <rect width="1200" height="280" fill="url(#glow)">
    <animate attributeName="opacity" values="0.65;1;0.65" dur="5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  </rect>

  <!-- corner crop-marks -->
  <g stroke="#00E5FF" stroke-width="1.4" stroke-linecap="round">
    <g opacity="0.45"><path d="M30 44 V30 H44"/><path d="M1170 44 V30 H1156"/>
      <animate attributeName="opacity" values="0.3;0.6;0.3" dur="4.5s" repeatCount="indefinite"/></g>
    <g opacity="0.45"><path d="M30 236 V250 H44"/><path d="M1170 236 V250 H1156"/>
      <animate attributeName="opacity" values="0.6;0.3;0.6" dur="4.5s" repeatCount="indefinite"/></g>
  </g>

  <!-- eyebrow -->
  <text x="600" y="62" text-anchor="middle" font-family="'SF Mono','JetBrains Mono','Fira Code',ui-monospace,monospace" font-size="12.5" letter-spacing="7" fill="#4FD4E8" opacity="0.92">SAN&#160;&#160;FRANCISCO&#160;&#160;BAY&#160;&#160;AREA</text>

  <!-- name with sheen sweep -->
  <g clip-path="url(#nameClip)">
    <rect x="250" y="104" width="700" height="62" fill="#F4FCFF"/>
    <g>
      <animateTransform attributeName="transform" type="translate" values="-320,0;-320,0;900,0;900,0" keyTimes="0;0.34;0.7;1" dur="6.5s" repeatCount="indefinite" calcMode="spline" keySplines="0 0 1 1;0.3 0 0.2 1;0 0 1 1"/>
      <rect x="0" y="88" width="120" height="96" fill="url(#sheen)" transform="skewX(-18)"/>
    </g>
  </g>

  <!-- underline with traveling highlight -->
  <g clip-path="url(#lineClip)">
    <rect x="420" y="175" width="360" height="2" rx="1" fill="#123A46"/>
    <rect x="420" y="175" width="150" height="2" rx="1" fill="url(#travel)">
      <animate attributeName="x" values="420;630;420" dur="5.5s" calcMode="spline" keySplines="0.45 0 0.15 1;0.45 0 0.15 1" repeatCount="indefinite"/>
    </rect>
  </g>

  <!-- role / tagline -->
  <text x="600" y="216" text-anchor="middle">
    <tspan font-family="'SF Pro Display','Segoe UI',Helvetica,Arial,system-ui,sans-serif" font-size="16" font-weight="600" letter-spacing="3.5" fill="#9FEFEA">DESIGN ENGINEER</tspan>
    <tspan font-size="15" fill="#2E4A52">&#160;&#160;&#160;·&#160;&#160;&#160;</tspan>
    <tspan font-family="'SF Mono','JetBrains Mono','Fira Code',ui-monospace,monospace" font-size="13.5" letter-spacing="1" fill="#6E838A">Figma &#8594; SwiftUI &#8594; App Store</tspan>
  </text>
</svg>
