<svg viewBox="0 0 1200 132" width="1200" height="132" xmlns="http://www.w3.org/2000/svg" fill="none" role="img" aria-label="Gazi Yeasin Arifin — footer">
  <defs>
    <linearGradient id="fbg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0D1117"/>
      <stop offset="1" stop-color="#0B0E14"/>
    </linearGradient>
    <linearGradient id="ftravel" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#00E5FF" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#8FF6FF" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#00E5FF" stop-opacity="0"/>
    </linearGradient>
    <clipPath id="hairClip"><rect x="0" y="0" width="1200" height="1.5"/></clipPath>
  </defs>

  <rect width="1200" height="132" fill="url(#fbg)"/>

  <!-- animated hairline -->
  <g clip-path="url(#hairClip)">
    <rect width="1200" height="1.5" fill="#0E2C36"/>
    <rect x="0" y="0" width="320" height="1.5" fill="url(#ftravel)">
      <animate attributeName="x" values="-320;1200" dur="4.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.5 0 0.5 1"/>
    </rect>
  </g>

  <!-- corner crop-marks (bottom) -->
  <g stroke="#00E5FF" stroke-width="1.4" opacity="0.35" stroke-linecap="round">
    <path d="M30 104 V118 H44"/><path d="M1170 104 V118 H1156"/>
    <animate attributeName="opacity" values="0.2;0.45;0.2" dur="5s" repeatCount="indefinite"/>
  </g>

  <text x="600" y="56" text-anchor="middle" font-family="'SF Pro Display','Segoe UI',Helvetica,Arial,system-ui,sans-serif" font-size="17" font-weight="600" letter-spacing="4" fill="#E6F6F9">GAZI YEASIN ARIFIN</text>

  <text x="600" y="82" text-anchor="middle" font-family="'SF Mono','JetBrains Mono','Fira Code',ui-monospace,monospace" font-size="12" letter-spacing="2.5" fill="#5D727A">DESIGNED &#38; BUILT IN SWIFTUI&#160;&#160;·&#160;&#160;AI-NATIVE PIPELINE</text>

  <text x="600" y="110" text-anchor="middle" font-family="'SF Mono','JetBrains Mono','Fira Code',ui-monospace,monospace" font-size="11" letter-spacing="2" fill="#3E5158">© 2026&#160;&#160;·&#160;&#160;GAZIARIFIN.COM</text>
</svg>
